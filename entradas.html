      <h2>Encuesta o datos de las entradas</h2>
      <p>Ingrese sus datos para realizar la reserva de la entrada</p>
<section>
    <div id="formulario">
      <h2>Tus datos</h2>
    <form action="#">
      <label for="">Nombre</label>
      <input type="text" name="formnombre" id="formnombre" maxlength="30" minlength="
      3" required placeholder="ingrese su nombre">
      <label for="">Apellido</label>
      <input type="text" name="formnombre" id="formnombre" maxlength="30" minlength="
      3" required placeholder="ingrese su apellido">
     <input id="formedad" type="number" placeholder="ingrese su edad">
     <input id="formclave" type="password" placeholder="ingrese la palabra secreta">
     <input type="eamail" placeholder="alumno@colegio.gmail">
     
     <input type="radio" name="formsexo" id="formf" value="femenino">
     <label for="fem">femenino</label>
    
     <input type="radio" name="formsexo" id="formm" value="masculino">
     <label for="mas">masculino</label>
    
     <input type="radio" name="formsexo" id="formn" value="prefiero no decirlo">
     <label for="no">no decirlo</label>
   
    <label for="ubicaciones">Seleccione una ubicación</label>
     <select name="ubicacion" id="formubi">
    <option value="plateaa">Platea Alta</option>
    <option value="plateam">Platea Media</option>
    <option value="plateab">Platea Baja</option>
